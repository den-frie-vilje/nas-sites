# Reusable workflow: roll back a site to a previous image tag.
#
# Retags the chosen immutable tag as `<env>-latest` at the
# registry manifest level (no image layers transferred), then
# POSTs the deploy webhook so the NAS pulls + recreates.
#
# Invoked from each consumer site's `rollback.yml`:
#   uses: den-frie-vilje/nas-sites/.github/workflows/rollback.yml@main

name: Rollback (reusable)

on:
  workflow_call:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: string
      image-name:
        description: 'GHCR image name, e.g. ghcr.io/den-frie-vilje/example-site'
        required: true
        type: string
      image-tag:
        description: 'Full immutable tag to roll back TO (e.g. production-2026-04-23T14-02-19Z-abc12345)'
        required: true
        type: string
      webhook-url:
        description: 'Deploy webhook URL for this (site, env)'
        required: true
        type: string
    secrets:
      WEBHOOK_SECRET:
        description: 'HMAC-SHA256 shared secret for the webhook.'
        required: true

jobs:
  rollback:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment: ${{ inputs.environment }}
    permissions:
      contents: read
      packages: write
    env:
      IMAGE: ${{ inputs.image-name }}
    steps:
      - name: Log into GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate source tag exists
        run: docker buildx imagetools inspect "$IMAGE:${{ inputs.image-tag }}"

      - name: Retag <env>-latest → the chosen immutable tag
        run: |
          docker buildx imagetools create \
            --tag "$IMAGE:${{ inputs.environment }}-latest" \
            "$IMAGE:${{ inputs.image-tag }}"

      - name: Trigger NAS deploy webhook
        env:
          SECRET: ${{ secrets.WEBHOOK_SECRET }}
          URL: ${{ inputs.webhook-url }}
          IMAGE_TAG: ${{ inputs.image-tag }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          BODY=$(jq -cn \
            --arg tag "$IMAGE_TAG" \
            --arg run "$RUN_URL" \
            '{image_tag: $tag, run_url: $run, rollback: true}')
          SIG="sha256=$(printf '%s' "$BODY" | openssl dgst -sha256 -hmac "$SECRET" | awk '{print $2}')"
          HTTP_CODE=$(curl -sS -o /tmp/resp.txt -w '%{http_code}' \
            -X POST "$URL" \
            -H "Content-Type: application/json" \
            -H "X-Hub-Signature-256: $SIG" \
            --data "$BODY" \
            --max-time 180 \
            --retry 3 --retry-delay 5 --retry-connrefused)
          echo "webhook HTTP $HTTP_CODE"
          cat /tmp/resp.txt || true
          [ "$HTTP_CODE" = "200" ] || exit 1

      - name: Summary
        run: |
          {
            echo "## Rolled back"
            echo ""
            echo "- Environment: **${{ inputs.environment }}**"
            echo "- \`${{ inputs.environment }}-latest\` now points at: \`${{ inputs.image-tag }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
