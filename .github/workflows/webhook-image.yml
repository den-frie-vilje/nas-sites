# Builds the shared deploy-webhook image used by every NAS
# running this pattern. Pushes to GHCR as
#   ghcr.io/den-frie-vilje/nas-webhook:latest
#
# Multi-arch (amd64 + arm64) so the same image runs on any
# NAS + on macOS for local debugging.
#
# Triggers on any change to shared/webhook/** or this workflow.

name: Build nas-webhook image

on:
  push:
    branches: [main]
    paths:
      - 'shared/webhook/**'
      - '.github/workflows/webhook-image.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log into GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push (multi-arch)
        uses: docker/build-push-action@v5
        with:
          context: ./shared/webhook
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ghcr.io/den-frie-vilje/nas-webhook:latest
          cache-from: type=registry,ref=ghcr.io/den-frie-vilje/nas-webhook:latest
          cache-to: type=inline

      - name: Summary
        run: |
          {
            echo "## nas-webhook image pushed"
            echo ""
            echo "- \`ghcr.io/den-frie-vilje/nas-webhook:latest\`"
            echo "- Platforms: \`linux/amd64\`, \`linux/arm64\`"
            echo ""
            echo "On NAS:"
            echo '```sh'
            echo 'cd /volume1/docker/webhook'
            echo 'sudo docker compose pull && sudo docker compose up -d'
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
