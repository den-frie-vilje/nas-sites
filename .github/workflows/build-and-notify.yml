# Reusable workflow: build a site image, push to GHCR, POST an
# HMAC-signed trigger to the NAS deploy webhook, smoke-check
# the live URL.
#
# Framework-agnostic: this workflow has NO language/build-tool
# assumptions. All build logic (pnpm, vite, pip, go, etc.) lives
# in the caller's Dockerfile. This workflow's only job is to:
#
#   1. docker buildx build + push (multi-arch)
#   2. Paranoia-scan the pushed image for leaked-secret shapes
#   3. POST an HMAC-signed trigger to the NAS webhook
#   4. Smoke-check the live URL (non-fatal)
#
# Invoked from each consumer site's `deploy-<env>.yml` via
#   `uses: den-frie-vilje/nas-sites/.github/workflows/build-and-notify.yml@main`

name: Build and notify (reusable)

on:
  workflow_call:
    inputs:
      environment:
        description: 'staging or production — used for env-scoped secrets/approvals + image tag prefix.'
        required: true
        type: string
      dockerfile:
        description: 'Path to the Dockerfile in the caller repo. Typically `deploy/Dockerfile`.'
        required: false
        type: string
        default: deploy/Dockerfile
      build-context:
        description: 'Docker build context path (relative to caller repo root).'
        required: false
        type: string
        default: .
      build-args:
        description: 'Newline-separated KEY=VALUE build args passed to docker build. Caller typically sets PUBLIC_GIT_SHA + PUBLIC_BUILD_TIME here for build-time Vite/bundler substitution.'
        required: false
        type: string
        default: ''
      image-name:
        description: 'GHCR image name, e.g. ghcr.io/den-frie-vilje/example-site. Tags are added by this workflow.'
        required: true
        type: string
      platforms:
        description: 'Comma-separated buildx platforms. Default linux/amd64 matches the Synology NAS (x86_64) and is ~2-3x faster than multi-arch. Callers can pass `linux/amd64,linux/arm64` for arm64-runnable (e.g. M-series Mac local debug) or arm64-only for a Pi NAS.'
        required: false
        type: string
        default: linux/amd64
      webhook-url:
        description: 'Full URL to POST the deploy trigger, e.g. https://example-com.stage.denfrievilje.dk/hooks/deploy/example.com/staging'
        required: true
        type: string
      smoke-check-url:
        description: 'Post-deploy URL to GET; logs the response code. Non-fatal.'
        required: false
        type: string
        default: ''
    secrets:
      WEBHOOK_SECRET:
        description: 'HMAC-SHA256 shared secret for the /hooks/deploy/<...> endpoint. Must match the value the NAS webhook has in its env.'
        required: true

# One deploy per environment at a time. Don't cancel — finishing a
# mid-deploy is better than leaving an inconsistent NAS state.
concurrency:
  group: deploy-${{ inputs.environment }}
  cancel-in-progress: false

jobs:
  build-and-notify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: ${{ inputs.environment }}
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # Need full git history for gitleaks to scan past
          # commits, not just HEAD. Adds a few seconds to
          # checkout but catches secrets that landed in any
          # ancestor commit (the threat model for repository
          # leaks: the secret only has to ship ONCE in any
          # commit accessible from the branch).
          fetch-depth: 0

      - name: gitleaks — scan source for committed secrets (Phase 6 / H4)
        # Replaces an earlier bespoke `grep -E` against the built
        # image filesystem (4 hardcoded patterns + private-key
        # headers). gitleaks ships ~150+ ruleset entries
        # maintained by the wider community — JWT shapes, AWS
        # access keys, Stripe / GitHub / GitLab tokens, npm
        # tokens, Slack webhooks, etc. — and scans the GIT
        # HISTORY (not just the checked-out HEAD), so a secret
        # that leaked into an ancestor commit is still caught
        # even if a later commit removed it.
        #
        # Pinned by manifest-index digest (Phase 5 / H2 + L1
        # discipline — every third-party image we run is locked
        # to specific bytes; bumps land via dependabot's docker
        # ecosystem in the npm/docker/github-actions group
        # rotation).
        #
        # Flags: --redact truncates secret values in the output
        # so CI logs never echo a leaked secret in plaintext;
        # --no-banner skips the ASCII banner.
        #
        # Non-zero exit → step fails → workflow stops before
        # build/push/deploy → secret never enters the registry.
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/repo:ro" \
            ghcr.io/gitleaks/gitleaks:v8.30.1@sha256:c00b6bd0aeb3071cbcb79009cb16a60dd9e0a7c60e2be9ab65d25e6bc8abbb7f \
            detect --source /repo --no-banner --redact

      - name: Generate image tags
        id: tags
        run: |
          TS="$(date -u +'%Y-%m-%dT%H-%M-%SZ')"
          SHA8="${GITHUB_SHA::8}"
          IMMUTABLE_TAG="${{ inputs.environment }}-${TS}-${SHA8}"
          MOVING_TAG="${{ inputs.environment }}-latest"
          {
            echo "immutable=${{ inputs.image-name }}:${IMMUTABLE_TAG}"
            echo "moving=${{ inputs.image-name }}:${MOVING_TAG}"
            echo "immutable-short=${IMMUTABLE_TAG}"
          } >> "$GITHUB_OUTPUT"

      - name: Log into GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        # Needed for multi-arch builds — linux/arm64 on amd64 runners
        # goes through QEMU emulation. Slow but ~free.
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: ${{ inputs.build-context }}
          file: ${{ inputs.dockerfile }}
          platforms: ${{ inputs.platforms }}
          push: true
          tags: |
            ${{ steps.tags.outputs.immutable }}
            ${{ steps.tags.outputs.moving }}
          build-args: ${{ inputs.build-args }}
          # GitHub Actions cache (Phase 7 / H5): faster than the
          # previous `type=registry,ref=<moving-tag>` lookup
          # (which round-tripped through GHCR every build) and
          # doesn't embed cache metadata into the pushed image
          # (the previous `type=inline` bloated the runtime
          # image with ~MB of layer-cache directives that the
          # NAS pulled but never used). `mode=max` caches all
          # intermediate layers — better hit rate, costs more
          # of the repo's 10 GB GH-Actions cache budget but
          # well under it for the sites we run today. Cache is
          # auto-scoped to the workflow ref by default.
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trigger NAS deploy webhook
        # HMAC-SHA256 body sign. Header name matches GitHub's own
        # webhook signing format so the receiver can reuse standard
        # verification. The webhook is configured to block until
        # deploy.sh completes and reflect its exit code in the HTTP
        # response (include-command-output-in-response: true in
        # shared/webhook/hooks.yaml), so a non-200 response here
        # means a real deploy failure, not just a misrouted POST.
        env:
          SECRET: ${{ secrets.WEBHOOK_SECRET }}
          URL: ${{ inputs.webhook-url }}
          IMAGE_TAG: ${{ steps.tags.outputs.immutable-short }}
          COMMIT: ${{ github.sha }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          # `ts` is a Unix timestamp in seconds (Phase 4 / H1).
          # Included in the HMAC-signed body so an attacker can't
          # replay a captured request indefinitely — the NAS-side
          # deploy.sh rejects anything with > 5 min skew. This is
          # belt-and-braces: the HMAC alone already requires the
          # shared secret, but a stable secret leaves a forever
          # replay window without ts.
          TS=$(date -u +%s)
          BODY=$(jq -cn \
            --arg tag "$IMAGE_TAG" \
            --arg sha "$COMMIT" \
            --arg run "$RUN_URL" \
            --argjson ts "$TS" \
            '{image_tag: $tag, commit_sha: $sha, run_url: $run, ts: $ts}')
          SIG="sha256=$(printf '%s' "$BODY" | openssl dgst -sha256 -hmac "$SECRET" | awk '{print $2}')"
          echo "POSTing to $URL (ts=$TS)"

          # Smart retry. Retry on:
          #   - curl exit non-zero (TCP drop, DNS fail, etc.)
          #   - HTTP 502/503/504 (upstream gateway errors —
          #     typically the DSM Web Station -> per-site Caddy
          #     proxy seeing Caddy mid-recreate during the deploy.
          #     The deploy.sh probably succeeded server-side; the
          #     retry just confirms with a fresh request).
          #
          # Do NOT retry on:
          #   - HTTP 200 (success)
          #   - HTTP 500 (with C3 redaction in hooks.yaml, this
          #     means deploy.sh genuinely failed — re-running just
          #     re-hits the same failure and spams logs)
          #   - HTTP 4xx (client error: HMAC mismatch, bad payload —
          #     not transient, fail fast)
          #
          # 180s delay between attempts: longer than the typical
          # NAS-side deploy (30-90s), so any retry fires AFTER
          # the original deploy.sh finished. Combined with the
          # per-site flock in deploy.sh, the second attempt is
          # idempotent — it re-pulls the (already-current) image,
          # recreates containers, and returns 200.
          #
          # Body suppressed for 5xx because DSM's gateway error
          # response is a multi-KB HTML page, not useful in CI logs.
          HTTP_CODE=
          for attempt in 1 2 3; do
            curl_exit=0
            HTTP_CODE=$(curl -sS -o /tmp/resp.txt -w '%{http_code}' \
                -X POST "$URL" \
                -H "Content-Type: application/json" \
                -H "X-Hub-Signature-256: $SIG" \
                --data "$BODY" \
                --max-time 300) || curl_exit=$?

            if [ "$curl_exit" -ne 0 ]; then
              echo "attempt $attempt: connection-level error (curl exit $curl_exit)"
            else
              case "$HTTP_CODE" in
                502|503|504)
                  echo "attempt $attempt: HTTP $HTTP_CODE (upstream gateway — deploy likely landed; retrying to confirm)"
                  ;;
                *)
                  # 200 success, or 4xx/500 — final outcome.
                  break
                  ;;
              esac
            fi

            if [ "$attempt" -lt 3 ]; then
              echo "retrying in 180s..."
              sleep 180
            fi
          done

          echo "webhook HTTP ${HTTP_CODE:-<no response>}"
          case "${HTTP_CODE:-}" in
            5*)
              echo "(body suppressed — gateway/server error pages can be multi-KB HTML)"
              ;;
            *)
              cat /tmp/resp.txt 2>/dev/null || true
              ;;
          esac
          [ "${HTTP_CODE:-}" = "200" ] || exit 1

      - name: Smoke check the live URL
        if: inputs.smoke-check-url != ''
        continue-on-error: true
        run: |
          URL="${{ inputs.smoke-check-url }}"
          sleep 10
          curl -sS -o /dev/null -w "GET %{url_effective}\n  http %{http_code}\n  time %{time_total}s\n" "$URL"

      - name: Summary
        run: |
          {
            echo "## Deployed"
            echo ""
            echo "- Environment: **${{ inputs.environment }}**"
            echo "- Image tag: \`${{ steps.tags.outputs.immutable-short }}\`"
            echo "- Commit: \`${GITHUB_SHA::8}\`"
            echo "- Platforms: \`${{ inputs.platforms }}\`"
            echo "- Webhook: \`${{ inputs.webhook-url }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
